name: Lint and Deploy

on:
  push:
    branches:
      - main
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Required for GitHub Pages deployment via Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel an in-progress run if a newer push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync latest devlogs
        # Updates the devlogs section in index.html in case it wasn't run locally.
        run: python build.py

      - name: Lint
        # Errors (missing components, leftover placeholders) = exit 1, blocks deploy.
        # Warnings (card/file mismatches, broken links) = printed but non-blocking.
        # Change to: python lint.py --strict   to also block on warnings.
        run: python lint.py

      - name: Prepare site
        run: |
          mkdir _site
          cp index.html _site/
          [ -f CNAME ] && cp CNAME _site/
          cp -r pages styles scripts resources _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
