<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workshop - Rat Haven Studios</title>
  <link rel="stylesheet" href="{{root}}styles/styles.css"/>
  <link rel="icon" type="image/png" href="{{root}}resources/logo-nt.png"/>
</head>

<body>

<!-- {{header}} -->

<section class="section">
  <div class="container">
    <h1>Workshop</h1>
    <p>
      Tutorials, resources, and writeups about game development. 
      Some stuff we've made, some stuff we think is cool and want to share.
    </p>
    <br>

    <!--
      FILTER TAGS - add these space-separated in data-tags="" on each .card
      Type  : tutorial | resource | writeup
      Topic : art | music | design | code
    -->
    <div class="filter-bar">
      <div class="filter-group" data-param="type">
        <span class="filter-label">Type</span>
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="tutorial">Tutorial</button>
        <button class="filter-btn" data-filter="resource">Resource</button>
        <button class="filter-btn" data-filter="writeup">Writeup</button>
      </div>
      <div class="filter-group" data-param="topic">
        <span class="filter-label">Topic</span>
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="art">Art</button>
        <button class="filter-btn" data-filter="music">Music</button>
        <button class="filter-btn" data-filter="design">Design</button>
        <button class="filter-btn" data-filter="code">Code</button>
      </div>
    </div>

    <div class="grid grid-3">

      <div class="card" data-tags="writeup code">
        <h3><a href="../workshop/2026-04-17_godot-state-machines.html">Godot State Machines</a></h3>
        <span class="card-subtitle">Writeup • Code • April 17, 2026</span>
        <p>Notes, thoughts, and opinions about State Machines in Godot.</p>
        <a href="../workshop/2026-04-17_godot-state-machines.html" class="btn">Read</a>
      </div>

    </div>
  </div>
</section>

<!-- {{footer}} -->

<script src="{{root}}scripts/filter.js"></script>
</body>
</html>
